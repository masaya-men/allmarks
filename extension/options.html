<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <h1>AllMarks settings</h1>
  <section>
    <h2>Auto-save on SNS button</h2>
    <p class="lede">When you press one of these buttons, the page is automatically saved to AllMarks. Already-saved URLs are skipped silently.</p>
    <label class="row">
      <input type="checkbox" id="autoSaveXLike" />
      <span>X (Twitter) — Like button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveXBookmark" />
      <span>X (Twitter) — Bookmark button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveYouTubeLike" />
      <span>YouTube — Like button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveYouTubeWatchLater" />
      <span>YouTube — Watch later</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveTikTokLike" />
      <span>TikTok — Like button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveTikTokFavorite" />
      <span>TikTok — Favorite button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveNoteLike" />
      <span>note — スキ button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSavePixivBookmark" />
      <span>Pixiv — Bookmark button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSavePixivLike" />
      <span>Pixiv — Like button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveVimeoLike" />
      <span>Vimeo — Like button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveVimeoWatchLater" />
      <span>Vimeo — Watch Later button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveSoundCloudLike" />
      <span>SoundCloud — Like button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveBlueskyLike" />
      <span>Bluesky — Like button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveBlueskyRepost" />
      <span>Bluesky — Repost button</span>
    </label>
    <label class="row">
      <input type="checkbox" id="autoSaveThreadsLike" />
      <span>Threads — Like button</span>
    </label>
  </section>
  <section>
    <label class="row">
      <input type="checkbox" id="autoOpenPip" />
      <span>Auto-open PiP on AllMarks tab</span>
    </label>
  </section>
  <section>
    <h2>Cursor pill position when no mouse data</h2>
    <label class="row"><input type="radio" name="pillPos" value="cursor" /> At cursor</label>
    <label class="row"><input type="radio" name="pillPos" value="bottom-right" /> Bottom-right corner</label>
  </section>
  <section>
    <h2>Keyboard shortcut</h2>
    <p>Default: <kbd>Ctrl+Shift+B</kbd> (Mac: <kbd>Cmd+Shift+B</kbd>)</p>
    <a href="#" id="shortcuts-link">Customize shortcuts</a>
  </section>
  <script src="options.js"></script>
</body>
</html>
